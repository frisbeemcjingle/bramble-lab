apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml

# Rolls the pods automatically whenever config.yaml changes -- without this,
# an ingress-rule edit sits in the ConfigMap and the running pods never notice.
configMapGenerator: []
generatorOptions:
  disableNameSuffixHash: false
