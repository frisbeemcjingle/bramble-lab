apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Replace with the tunnel UUID printed by `cloudflared tunnel create wvdevops`.
    # A UUID is safer here than the name -- it survives a rename.
    tunnel: a89ab331-5415-4e02-a31c-14db59c51062
    credentials-file: /etc/cloudflared/creds/credentials.json

    metrics: 0.0.0.0:2000
    no-autoupdate: true

    # Graceful shutdown so a rolling update doesn't drop in-flight requests.
    grace-period: 30s

    # Single catch-all: everything goes to Traefik, which routes by Host header
    # using ordinary Ingress objects. Adding an app = adding an Ingress. No edit here.
    ingress:
      - service: http://traefik.kube-system.svc.cluster.local:80
